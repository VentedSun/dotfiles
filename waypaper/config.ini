[Settings]
language = en
folder = ~/Pictures
monitors = All,DP-2,DP-1
wallpaper = ~/Pictures/PurpleCliffsBackground.png,~/Pictures/PurpleCliffsBackground.png,~/Pictures/PurpleCliffsBackground_waifu2x_art_noise1_scale.png
show_path_in_tooltip = True
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = matugen --contrast -0.5 image --verbose "$wallpaper"
number_of_columns = 3
swww_transition_type = outer
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False

