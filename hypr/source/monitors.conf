# See https://wiki.hypr.land/Configuring/Monitors/

#monitor = DP-1, 5120x1440@144,0x0,auto


#monitor = DP-1, 5120x1440@144,0x0,auto
#monitor = DP-2, 1920x1080@60,auto-up,auto

monitorv2 {
    output = DP-1
    mode = 5120x1440@144
    position = 0x0
    scale = auto
    #for the below two values 0=auto, 1=force on, -1=force off
    supports_wide_color = -1
    supports_hdr = -1
    bitdepth = 10
    cm = auto
    sdrbrightness = 1.2
    sdrsaturation =  0.98
}

monitorv2 {
    output = DP-2
    mode = 1920x1080@60
    position = auto-up
    scale = auto
}
