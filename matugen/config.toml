[config]

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/source/colors.conf'

[templates.starship]
input_path = '~/.config/matugen/templates/starship-colors.toml'
output_path = '~/.config/starship.toml'

[templates.colors]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/colors.css'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell-colors.qml'
output_path = '~/.config/quickshell/Colors.qml'

[templates.qt5ct]
input_path = "./templates/qtct-colors.conf"
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = "./templates/qtct-colors.conf"
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.chaos]
input_path = '~/.config/quickshell/chaos-shell/common/templates/quickshell.json'
output_path = '~/.config/chaos-labs/theme.json'
post_hook = 'for sock in /tmp/mykitty*; do kitty @ --to unix:$sock load-config; done'
